<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <rect width="320" height="100" fill="#0E0F0C"/>

  <!-- Arc -->
  <path d="M16 68 A32 32 0 1 1 80 68" stroke="#B5FF2D" stroke-width="4.5" stroke-linecap="round" fill="none"/>

  <!-- Ticks -->
  <line x1="16.5" y1="67" x2="23" y2="64.5" stroke="#B5FF2D" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
  <line x1="19.5" y1="51" x2="26" y2="55"   stroke="#B5FF2D" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
  <line x1="30"   y1="38" x2="35" y2="43"   stroke="#B5FF2D" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
  <line x1="48"   y1="32" x2="48" y2="39"   stroke="#B5FF2D" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
  <line x1="66"   y1="38" x2="61" y2="43"   stroke="#B5FF2D" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
  <line x1="76.5" y1="51" x2="70" y2="55"   stroke="#B5FF2D" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
  <line x1="79.5" y1="67" x2="73" y2="64.5" stroke="#B5FF2D" stroke-width="2" stroke-linecap="round" opacity="0.45"/>

  <!-- Needle -->
  <line x1="48" y1="61" x2="65" y2="42" stroke="#B5FF2D" stroke-width="3" stroke-linecap="round"/>

  <!-- Pivot -->
  <circle cx="48" cy="61" r="5"   fill="#B5FF2D"/>
  <circle cx="48" cy="61" r="2.2" fill="#0E0F0C"/>

  <!-- $ tip -->
  <text x="68" y="41"
    font-family="'Barlow Condensed', 'Arial Narrow', sans-serif"
    font-weight="800" font-size="15" fill="#B5FF2D" text-anchor="middle">$</text>

  <!-- Wordmark -->
  <text x="104" y="52"
    font-family="'Barlow Condensed', 'Arial Narrow', sans-serif"
    font-weight="800" font-size="30" fill="#F7F8F2" letter-spacing="-0.3">GRANA</text>
  <text x="104" y="80"
    font-family="'Barlow Condensed', 'Arial Narrow', sans-serif"
    font-weight="500" font-size="30" fill="#B5FF2D" letter-spacing="-0.3">CERTA</text>
</svg>
