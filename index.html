<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0E0F0C" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#F7F8F2" media="(prefers-color-scheme: light)">
<meta name="description" content="Acompanhamento OKR do Ciclo 3 — Grana Certa · 12 semanas">
<title>Grana Certa — Ciclo 12 Semanas</title>
<link rel="icon" type="image/svg+xml" href="app-icon-512.svg">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700;800&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<script>
(function() {
  var saved = localStorage.getItem('gc-theme');
  var theme = saved || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
  document.documentElement.setAttribute('data-theme', theme);
})();
</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
::selection { background: #B5FF2D; color: #000; }
input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); }
:root[data-theme="dark"] input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); }

:root {
  --accent-fill: #B5FF2D;
  --accent-pressed: #9AE01A;
  --on-accent: #000;
  --ok: #22C55E;
  --ok-bg: #0D2B1A;
  --risk: #FFAA00;
  --risk-bg: #2B1F00;
  --danger: #FF4040;
  --danger-bg: #2B0A0A;
  --info: #4D9EFF;
}
:root[data-theme="dark"] {
  --bg: #0E0F0C; --surface: #161712; --elevated: #1F2119; --overlay: #2A2D22;
  --text: #F7F8F2; --text-2: #D4D6CE; --muted: #6B7060;
  --accent: #B5FF2D; --accent-subtle: #3D5A06; --accent-border: #72A812;
  --border: #2A2D22; --border-strong: #3D4030;
}
:root[data-theme="light"] {
  --bg: #F7F8F2; --surface: #FFFFFF; --elevated: #FFFFFF; --overlay: #ECEEE6;
  --text: #0E0F0C; --text-2: #4A5040; --muted: #A8AA9E;
  --accent: #5A8A00; --accent-subtle: #E8FFB0; --accent-border: #CCEE80;
  --border: #E5E7DF; --border-strong: #C8CABC;
  --ok-bg: #DCFCE7; --risk-bg: #FFF3D0; --danger-bg: #FFE5E5;
}

html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--text);
  font-family: Inter, sans-serif; font-size: 14px; line-height: 1.6;
  min-height: 100vh; -webkit-font-smoothing: antialiased;
  transition: background 0.2s, color 0.2s;
}

.sticky-header {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 28px; border-bottom: 1px solid var(--border);
  background: var(--bg); gap: 16px; flex-wrap: wrap;
}
.header-left { display: flex; align-items: center; gap: 10px; min-width: 0; flex-wrap: wrap; }
.header-mark svg { display: block; flex-shrink: 0; }
.header-wordmark {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 800;
  font-size: 15px; line-height: 0.95; letter-spacing: 0.4px;
}
.header-wordmark .w1 { color: var(--text); }
.header-wordmark .w2 { color: var(--accent); font-weight: 500; }
.header-divider { width: 1px; height: 24px; background: var(--border); margin: 0 6px; flex-shrink: 0; }
.header-cycle {
  font-family: Inter, sans-serif; font-weight: 600; font-size: 11px;
  letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase;
}
.header-cycle em { font-style: normal; color: var(--accent); }
.header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

.btn-copy {
  display: flex; align-items: center; gap: 7px;
  font-family: Inter, sans-serif; font-weight: 600; font-size: 11px;
  letter-spacing: 1px; text-transform: uppercase;
  background: var(--surface); color: var(--text-2);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 8px 14px; cursor: pointer; transition: border-color 0.15s, background 0.15s;
}
.btn-copy:hover { border-color: var(--accent-border); }
.btn-copy.is-copied { background: var(--accent-subtle); color: var(--accent); border-color: var(--accent-border); }

.sync-pill {
  display: flex; align-items: center; gap: 6px;
  font-family: Inter, sans-serif; font-size: 10px; font-weight: 600;
  letter-spacing: 1px; text-transform: uppercase; color: var(--muted);
}
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
.sync-dot.syncing { background: var(--risk); animation: pulse 1s infinite; }
.sync-dot.synced { background: var(--ok); }
.sync-dot.error { background: var(--danger); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.theme-toggle {
  width: 32px; height: 32px; border-radius: 16px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--accent); display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: border-color 0.15s;
}
.theme-toggle:hover { border-color: var(--accent-border); }
.theme-toggle svg { width: 15px; height: 15px; display: block; }
.theme-toggle .icon-sun { display: none; }
.theme-toggle .icon-moon { display: block; }
:root[data-theme="light"] .theme-toggle .icon-sun { display: block; }
:root[data-theme="light"] .theme-toggle .icon-moon { display: none; }

.main { max-width: 1160px; margin: 0 auto; padding: 0 28px 80px; }

.section-head {
  display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px;
}
.section-head.accent .section-dash { background: var(--accent-fill); }
.section-dash { width: 20px; height: 2px; background: var(--accent-fill); flex-shrink: 0; }
.section-title {
  font-family: Inter, sans-serif; font-weight: 600; font-size: 12px;
  letter-spacing: 0.27em; text-transform: uppercase;
}
.section-title.accent { color: var(--accent); }
.section-title.muted { color: var(--muted); font-size: 11px; }
.section-rule { height: 1px; background: var(--border); margin-bottom: 16px; }

.obj-row {
  padding-top: 24px; display: flex; align-items: center;
  justify-content: space-between; gap: 20px; flex-wrap: wrap;
}
.obj-h1 {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 800;
  font-size: 28px; letter-spacing: -0.02em; line-height: 1.05; margin: 0;
}
.obj-h1 em { font-style: normal; color: var(--accent); }
.obj-summary {
  font-size: 13px; line-height: 1.5; color: var(--text-2); max-width: 480px;
}

.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
@media (max-width: 900px) { .grid-3 { grid-template-columns: 1fr; } }

.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 18px;
}
.card-label {
  font-family: Inter, sans-serif; font-weight: 600; font-size: 11px;
  letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase;
}
.card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.badge {
  font-family: Inter, sans-serif; font-weight: 600; font-size: 10px;
  letter-spacing: 1.5px; padding: 3px 8px; border-radius: 20px;
}
.metric-pair { display: flex; gap: 20px; }
.metric-box .metric-key {
  font-family: 'Space Grotesk', monospace; font-size: 10px; color: var(--muted);
}
.metric-box .metric-val {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 26px;
}
.metric-box .metric-val.secondary { color: var(--text-2); }

.week-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 16px; margin-top: 0; }
.week-grid .metric-key {
  font-family: 'Space Grotesk', monospace; font-size: 10px; color: var(--muted);
}
.week-grid .metric-val {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 19px;
}

.revenue-bar {
  margin-top: 20px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 14px 18px;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.revenue-bar label {
  font-family: Inter, sans-serif; font-weight: 600; font-size: 11px;
  letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; white-space: nowrap;
}
.revenue-bar input[type="date"],
.revenue-bar input[type="number"],
.revenue-bar input[type="text"] {
  background: var(--elevated); border: 1px solid var(--border-strong);
  border-radius: 6px; padding: 7px 10px; height: 36px;
  font-family: 'Space Grotesk', monospace; font-size: 12px; color: var(--text);
  outline: none; box-sizing: border-box;
}
.revenue-bar input[type="number"] { width: 110px; }
.revenue-bar input:focus { border-color: var(--accent-fill); }
.revenue-bar .btn-add {
  margin-top: 0; height: 36px; padding: 0 16px; flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center;
}
.revenue-chips { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.revenue-chip {
  font-family: 'Space Grotesk', monospace; font-size: 11px; color: var(--text-2);
  background: var(--elevated); border: 1px solid var(--border);
  border-radius: 20px; padding: 4px 10px;
}

.trend-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px; flex-wrap: wrap; gap: 10px;
}
.trend-controls { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.metric-pills { display: flex; gap: 6px; align-items: center; }
.metric-pill {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 15px;
  background: transparent; color: var(--text-2);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 8px 16px; cursor: pointer; transition: all 0.15s;
}
.metric-pill.is-active {
  background: var(--accent-subtle); color: var(--accent); border-color: var(--accent-border);
}
.period-pills { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.period-pill {
  font-family: Inter, sans-serif; font-weight: 600; font-size: 10px;
  letter-spacing: 1px; text-transform: uppercase;
  background: transparent; color: var(--muted);
  border: 1px solid var(--border); border-radius: 20px;
  padding: 6px 12px; cursor: pointer; transition: all 0.15s;
}
.period-pill.is-active {
  background: var(--accent-subtle); color: var(--accent); border-color: var(--accent-border);
}
.period-dates input {
  background: var(--elevated); border: 1px solid var(--border-strong);
  border-radius: 6px; padding: 5px 8px;
  font-family: 'Space Grotesk', monospace; font-size: 11px; color: var(--text);
}
.chart-card { padding: 22px; }
.chart-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.chart-legend { display: flex; gap: 14px; flex-wrap: wrap; }
.chart-legend span {
  display: flex; align-items: center; gap: 5px;
  font-family: 'Space Grotesk', monospace; font-size: 10px; color: var(--text-2);
}
.chart-legend i { display: block; width: 10px; height: 2px; }
.chart-wrap { position: relative; }
.chart-axis-x {
  position: absolute; top: 97.5%; transform: translateX(-50%);
  font-family: 'Space Grotesk', monospace; font-size: 10px; color: var(--muted); white-space: nowrap;
}
.chart-axis-x.is-today { font-weight: 700; color: var(--accent); }
.chart-axis-y {
  position: absolute; left: 0; transform: translateY(-50%);
  font-family: 'Space Grotesk', monospace; font-size: 10px; color: var(--muted);
  background: var(--surface); padding-right: 4px;
}
.chart-real-label {
  position: absolute; transform: translate(-50%, -100%);
  font-family: 'Space Grotesk', monospace; font-size: 10px; color: var(--text-2);
  white-space: nowrap; pointer-events: none;
}
.chart-empty {
  height: 320px; display: flex; align-items: center; justify-content: center;
  font-family: 'Space Grotesk', monospace; font-size: 11px; color: var(--muted); text-align: center;
}
@media (max-width: 680px) {
  .trend-head { flex-direction: column; align-items: stretch; }
  .metric-pill { font-size: 13px; padding: 7px 12px; }
}

.week-row {
  border: 1px solid var(--border); border-radius: 6px;
  margin-bottom: 8px; overflow: hidden; background: transparent;
}
.week-row.is-current { background: var(--surface); border-color: var(--accent-fill); }
.week-row-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px; cursor: pointer; user-select: none; gap: 12px;
}
.week-row-head:hover { background: var(--overlay); }
.week-num {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
  font-size: 13px; width: 30px; flex-shrink: 0;
}
.week-row.is-future .week-num { color: var(--muted); }
.week-dots { display: flex; gap: 5px; }
.week-dots i { width: 6px; height: 6px; border-radius: 3px; display: block; }
.week-meta { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
.week-dates { font-family: 'Space Grotesk', monospace; font-size: 11px; color: var(--muted); }
.status-chip {
  font-family: Inter, sans-serif; font-weight: 600; font-size: 10px;
  letter-spacing: 1.5px; padding: 4px 10px; border-radius: 20px;
}
.week-chevron { color: var(--muted); transition: transform 0.15s; font-size: 12px; }
.week-row.is-open .week-chevron { transform: rotate(180deg); }
.week-body { padding: 0 18px 18px; display: none; }
.week-row.is-open .week-body { display: block; }
.week-values { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 14px; }
@media (max-width: 560px) { .week-values { grid-template-columns: 1fr; } }
.week-field label {
  font-family: Inter, sans-serif; font-weight: 600; font-size: 10px;
  letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase;
  display: block; margin-bottom: 6px;
}
.week-field input, .week-field textarea {
  width: 100%; background: var(--elevated); border: 1px solid var(--border);
  border-radius: 6px; padding: 10px 12px; color: var(--text);
  font-family: 'Space Grotesk', monospace; font-size: 14px; outline: none;
}
.week-field input:focus, .week-field textarea:focus { border-color: var(--accent-fill); }
.week-field textarea { font-family: Inter, sans-serif; font-size: 13px; min-height: 56px; resize: vertical; }
.week-field .display-val {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 20px;
}
.btn-save {
  margin-top: 14px; font-family: Inter, sans-serif; font-weight: 600;
  font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
  background: var(--accent-fill); color: var(--on-accent);
  border: none; border-radius: 6px; padding: 8px 16px; cursor: pointer;
}
.btn-save:hover { background: var(--accent-pressed); }
.btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

.mt-36 { margin-top: 36px; }
.mt-40 { margin-top: 40px; }
.mt-48 { margin-top: 48px; }

.toast {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--accent-fill); color: var(--on-accent);
  font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase; border-radius: 20px;
  padding: 12px 20px; opacity: 0; transform: translateY(8px);
  transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 999;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.error { background: var(--danger); color: var(--on-accent); }

@media (max-width: 680px) {
  .sticky-header { padding: 12px 16px; }
  .header-divider, .header-cycle { display: none; }
  .main { padding: 0 16px 60px; }
  .header-left { gap: 8px; }
}
</style>
</head>
<body>

<header class="sticky-header">
  <div class="header-left">

function getCurrentWeek() {
  const diff = Date.now() - CICLO_START.getTime();
  if (diff < 0) return 1;
  return Math.min(Math.max(Math.floor(diff / (7 * 86400000)) + 1, 1), 12);
}
function getTodayDay() {
  const diff = Math.floor((Date.now() - CICLO_START.getTime()) / 86400000) + 1;
  return Math.min(Math.max(diff, 1), CYCLE_DAYS);
}
const CURRENT_WEEK = getCurrentWeek();
const TODAY = getTodayDay();

function weekOf(d) { return Math.ceil(d / 7); }
function weekStartDay(w) { return (w - 1) * 7 + 1; }
function weekEndDay(w) { return Math.min(w * 7, CYCLE_DAYS); }
function dateForDay(d) { return new Date(CICLO_START.getTime() + (d - 1) * 86400000); }
function fmtDateShort(dt) { return String(dt.getDate()).padStart(2,'0') + '/' + String(dt.getMonth()+1).padStart(2,'0'); }
function isoForDay(d) {
  const dt = dateForDay(d);
  return dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
}
function dayFromISO(iso) {
  const dt = new Date(iso + 'T12:00:00');
  return Math.round((dt - CICLO_START) / 86400000) + 1;
}
function metricsPeriod() {
  const end = new Date();
  const start = new Date(end.getTime() - WAU_PERIOD_DAYS * 86400000);
  return { inicio: start.toISOString(), fim: end.toISOString() };
}
function dayRollingPeriodBounds(d) {
  return {
    inicio: dateForDay(d - 6).toISOString(),
    fim: d === TODAY
      ? new Date().toISOString()
      : new Date(dateForDay(d).getTime() + 86400000).toISOString(),
  };
}
function rollingCacheKey(d, bounds) {
  return `roll:d${d}:${bounds.inicio}:${bounds.fim}`;
}
function loadDayCache() {
  try { return JSON.parse(sessionStorage.getItem(DAY_CACHE_KEY) || '{}'); } catch (_) { return {}; }
}
function saveDayCache(cache) {
  try { sessionStorage.setItem(DAY_CACHE_KEY, JSON.stringify(cache)); } catch (_) {}
}
function dayMetricAt(key, d) {
  return DAY_METRICS[d]?.[key] ?? null;
}
function weekPeriodBounds(w) {
  const startDay = weekStartDay(w);
  const endDay = Math.min(weekEndDay(w), TODAY);
  if (startDay > TODAY) return null;
  return {
    inicio: dateForDay(startDay).toISOString(),
    fim: new Date(dateForDay(endDay).getTime() + 86400000).toISOString(),
  };
}
function histCacheKey(w, bounds) {
  return `w${w}:${bounds.inicio}:${bounds.fim}`;
}
function loadHistCache() {
  try { return JSON.parse(sessionStorage.getItem(HIST_CACHE_KEY) || '{}'); } catch (_) { return {}; }
}
function saveHistCache(cache) {
  try { sessionStorage.setItem(HIST_CACHE_KEY, JSON.stringify(cache)); } catch (_) {}
}
function historyMetricAtWeek(key, w) {
  if (w > CURRENT_WEEK) return null;
  return HIST_METRICS[w]?.[key] ?? null;
}
function tespConfigured() {
  return !TESP_SUPABASE_URL.includes('SEU-PROJETO') && !TESP_SUPABASE_KEY.includes('SUA-CHAVE');
}
function expectedAt(w) { return { m1: EXPECTED.m1[w], m2: EXPECTED.m2[w], m3: EXPECTED.m3[w] }; }

function expectedAtDay(d) {
  const w = weekOf(d);
  const prev = w > 1 ? expectedAt(w - 1) : { m1: 438, m2: 0, m3: 5.6 };
  const curr = expectedAt(w);
  const frac = (d - weekStartDay(w) + 1) / 7;
  return {
    m1: prev.m1 + (curr.m1 - prev.m1) * frac,
    m2: prev.m2 + (curr.m2 - prev.m2) * frac,
    m3: prev.m3 + (curr.m3 - prev.m3) * frac,
  };
}

function prevWeekValues(w) {
  if (w <= 1) return { ...BASELINE };
  const d = DB[w - 1];
  return {
    m1: d?.m1 ?? BASELINE.m1,
    m2: d?.m2 ?? BASELINE.m2,
    m3: d?.m3 ?? BASELINE.m3,
  };
}

function actualAtDay(d) {
  if (d > TODAY) return null;
  const w = weekOf(d);
  const row = DB[w];
  const liveRow = w === CURRENT_WEEK && LIVE.available
    ? { m1: LIVE.m1, m3: LIVE.m3, m2: row?.m2 ?? null }
    : row;
  if (!liveRow || (liveRow.m1 == null && liveRow.m3 == null)) return null;
  const prev = prevWeekValues(w);
  const frac = (d - weekStartDay(w) + 1) / 7;
  return {
    m1: liveRow.m1 != null ? prev.m1 + (liveRow.m1 - prev.m1) * frac : null,
    m2: liveRow.m2 != null ? liveRow.m2 : revenueUpToDay(d),
    m3: liveRow.m3 != null ? prev.m3 + (liveRow.m3 - prev.m3) * frac : null,
  };
}

function latestMetric(key, upToWeek) {
  if (upToWeek === CURRENT_WEEK && LIVE.available && LIVE[key] != null) return LIVE[key];
  for (let s = upToWeek; s >= 1; s--) {
    if (DB[s]?.[key] != null) return DB[s][key];
  }
  return BASELINE[key];
}

function revenueUpToDay(d) {
  return revenueEntries.filter(e => e.day <= d).reduce((s, e) => s + e.value, 0);
}
function revenueOnDay(d) {
  return revenueEntries.filter(e => e.day === d).reduce((s, e) => s + e.value, 0);
}

function tierOf(pace) { return pace >= 95 ? 'success' : pace >= 70 ? 'warning' : 'danger'; }
function fmtInt(n) { return Math.round(n).toLocaleString('pt-BR'); }
function fmtMoney(n) { return 'R$' + Math.round(n).toLocaleString('pt-BR'); }
function fmtMin(n) { return Number(n).toFixed(2) + ' min'; }
function badgeStyle(tier) {
  if (tier === 'success') return { bg: 'var(--ok-bg)', color: 'var(--ok)', label: '● BATEU' };
  if (tier === 'danger') return { bg: 'var(--danger-bg)', color: 'var(--danger)', label: '● NÃO BATEU' };
  return { bg: 'var(--overlay)', color: 'var(--muted)', label: '○ AGUARDANDO' };
}
function pctColor(pace) {
  const tr = tierOf(pace);
  return tr === 'success' ? 'var(--ok)' : tr === 'warning' ? 'var(--risk)' : 'var(--danger)';
}

function linreg(points) {
  const n = points.length;
  if (n < 2) return { slope: 0, intercept: points[0]?.y ?? 0 };
  let sx=0, sy=0, sxy=0, sxx=0;
  points.forEach(p => { sx+=p.x; sy+=p.y; sxy+=p.x*p.y; sxx+=p.x*p.x; });
  const denom = (n * sxx - sx * sx) || 1;
  return { slope: (n * sxy - sx * sy) / denom, intercept: (sy - (n * sxy - sx * sy) / denom * sx) / n };
}

const CHART_W = 900, CHART_H = 320, PAD_L = 46, PAD_R = 12, PAD_T = 28, PAD_B = 28;
function chartSx(x, domainMin, domainMax) {
  return PAD_L + ((x - domainMin) / ((domainMax - domainMin) || 1)) * (CHART_W - PAD_L - PAD_R);
}
function chartSy(y, ymin, ymax) {
  return (CHART_H - PAD_B) - ((y - ymin) / ((ymax - ymin) || 1)) * (CHART_H - PAD_B - PAD_T);
}
function pathFromPoints(pts, domainMin, domainMax, ymin, ymax) {
  return pts.map((p, i) => (i === 0 ? 'M' : 'L') + chartSx(p.x, domainMin, domainMax).toFixed(1) + ' ' + chartSy(p.y, ymin, ymax).toFixed(1)).join(' ');
}

function trendPeriodBounds() {
  let periodStartDay, periodEndDay;
  if (trendPeriod === '7') {
    periodStartDay = TODAY - 3;
    periodEndDay = Math.min(CYCLE_DAYS, TODAY + 3);
  } else if (trendPeriod === '14') {
    periodStartDay = TODAY - 7;
    periodEndDay = Math.min(CYCLE_DAYS, TODAY + 6);
  } else if (trendPeriod === 'cycle') {
    periodStartDay = 1;
    periodEndDay = TODAY;
  } else {
    periodStartDay = dayFromISO(customStart) || 1;
    periodEndDay = Math.min(CYCLE_DAYS, dayFromISO(customEnd) || TODAY);
    if (periodStartDay > periodEndDay) periodStartDay = periodEndDay;
  }
  return { periodStartDay, periodEndDay };
}

function expectedForKey(key, d) {
  if (d < 1) return key === 'm2' ? 0 : BASELINE[key];
  return expectedAtDay(d)[key];
}

function metricDayReader(key, d) {
  if (key === 'm2') {
    if (d < 1) return 0;
    if (d > TODAY) return expectedForKey(key, d);
    return revenueUpToDay(d);
  }
  if (d > TODAY) return expectedForKey(key, d);
  const val = dayMetricAt(key, d);
  if (val != null) return val;
  if (d === TODAY && LIVE.available && LIVE[key] != null) return LIVE[key];
  return BASELINE[key];
}

const TREND_METRICS = {
  users: { key: 'm1', label: 'Usuários (WAU)', fmt: n => fmtInt(n) },
  revenue: { key: 'm2', label: 'Receita acumulada', fmt: n => fmtMoney(n) },
  tempo: { key: 'm3', label: 'Tempo médio', fmt: n => Number(n).toFixed(1) },
};

function trendMetricHasData(key) {
  if (key === 'm2') return revenueEntries.length > 0 || Object.values(DB).some(r => r?.m2 != null);
  const hasDay = Object.values(DAY_METRICS).some(r => r?.[key] != null);
  if (key === 'm1') return hasDay || Object.values(HIST_METRICS).some(r => r?.m1 != null) || LIVE.available || Object.values(DB).some(r => r?.m1 != null);
  return hasDay || Object.values(HIST_METRICS).some(r => r?.m3 != null) || LIVE.available || Object.values(DB).some(r => r?.m3 != null);
}

function buildChart(label, key, hasData, axisFmt, weekly) {
  if (!hasData) return { label, empty: true };
  const { periodStartDay, periodEndDay } = trendPeriodBounds();
  let realPts, metaPts, projPts, domainMin, domainMax, xTicks, labelStep = 1;

  if (weekly) {
    domainMin = 0;
    domainMax = 12;
    const maxWeek = Math.min(12, weekOf(TODAY));
    realPts = [];
    for (let wk = 0; wk <= maxWeek; wk++) {
      const day = wk === 0 ? 0 : Math.min(weekEndDay(wk), TODAY);
      realPts.push({ x: wk, y: metricDayReader(key, day) });
    }
    metaPts = [];
    for (let wk = 1; wk <= 12; wk++) metaPts.push({ x: wk, y: expectedForKey(key, weekEndDay(wk)) });
    const regPts = [];
    for (let d = TODAY - 7; d <= TODAY; d++) regPts.push({ x: d, y: metricDayReader(key, d) });
    const reg = linreg(regPts);
    projPts = [
      { x: 1, y: reg.slope * weekEndDay(1) + reg.intercept },
      { x: 12, y: reg.slope * weekEndDay(12) + reg.intercept },
    ];
    xTicks = [];
    for (let wk = 0; wk <= 12; wk++) xTicks.push({ x: wk, label: 'S' + wk, isToday: wk === weekOf(TODAY) });
  } else {
    domainMin = periodStartDay;
    domainMax = Math.max(periodStartDay + 1, periodEndDay);
    realPts = [];
    for (let d = periodStartDay; d <= Math.min(periodEndDay, TODAY); d++) {
      realPts.push({ x: d, y: metricDayReader(key, d) });
    }
    metaPts = [];
    for (let d = periodStartDay; d <= periodEndDay; d++) metaPts.push({ x: d, y: expectedForKey(key, d) });
    const reg = linreg(realPts.length >= 2 ? realPts : metaPts);
    projPts = [
      { x: periodStartDay, y: reg.slope * periodStartDay + reg.intercept },
      { x: periodEndDay, y: reg.slope * periodEndDay + reg.intercept },
    ];
    const span = periodEndDay - periodStartDay;
    const step = span <= 7 ? 1 : Math.ceil((span + 1) / 6);
    labelStep = step;
    xTicks = [];
    for (let d = periodStartDay; d <= periodEndDay; d += step) {
      xTicks.push({ x: d, label: fmtDateShort(dateForDay(d)), isToday: d === TODAY });
    }
    if (!xTicks.some(xt => xt.isToday) && TODAY >= periodStartDay && TODAY <= periodEndDay) {
      xTicks.push({ x: TODAY, label: fmtDateShort(dateForDay(TODAY)), isToday: true });
    }
  }

  const allY = [...realPts.map(p => p.y), ...metaPts.map(p => p.y), ...projPts.map(p => p.y)];
  const ymin = Math.min(...allY), ymax = Math.max(...allY);
  const pad = (ymax - ymin) * 0.12 || 1;
  const yLo = ymin - pad, yHi = ymax + pad;
  const plotBottom = CHART_H - PAD_B;

  const xTicksOut = xTicks.map(xt => ({
    px: chartSx(xt.x, domainMin, domainMax).toFixed(1),
    leftPct: ((chartSx(xt.x, domainMin, domainMax) / CHART_W) * 100).toFixed(1),
    label: xt.label,
    isToday: !!xt.isToday,
    lineStroke: xt.isToday ? 'var(--accent-fill)' : 'var(--border)',
    lineWidth: xt.isToday ? 2 : 1,
  }));
  const yTicks = [
    { topPct: ((chartSy(yHi, yLo, yHi) / CHART_H) * 100).toFixed(1), label: axisFmt(ymax) },
    { topPct: ((chartSy(yLo, yLo, yHi) / CHART_H) * 100).toFixed(1), label: axisFmt(ymin) },
  ];
  const realDots = realPts.map(p => ({
    cx: chartSx(p.x, domainMin, domainMax).toFixed(1),
    cy: chartSy(p.y, yLo, yHi).toFixed(1),
  }));
  const realLabels = realPts
    .filter(p => weekly ? true : ((p.x - domainMin) % labelStep === 0 || p.x === TODAY || p.x === realPts[realPts.length - 1].x))
    .map(p => ({
      leftPct: ((chartSx(p.x, domainMin, domainMax) / CHART_W) * 100).toFixed(1),
      labelTopPct: (((chartSy(p.y, yLo, yHi) - 10) / CHART_H) * 100).toFixed(1),
      label: axisFmt(p.y),
    }));

  return {
    label, empty: false, plotBottom,
    realPath: pathFromPoints(realPts, domainMin, domainMax, yLo, yHi),
    metaPath: pathFromPoints(metaPts, domainMin, domainMax, yLo, yHi),
    projPath: pathFromPoints(projPts, domainMin, domainMax, yLo, yHi),
    xTicks: xTicksOut, yTicks, realDots, realLabels,
  };
}

const okrHeaders = {
  apikey: OKR_SUPABASE_KEY,
  Authorization: 'Bearer ' + OKR_SUPABASE_KEY,
  'Content-Type': 'application/json',
  Prefer: 'return=representation',
};
const tespHeaders = {
  apikey: TESP_SUPABASE_KEY,
  Authorization: 'Bearer ' + TESP_SUPABASE_KEY,
  'Content-Type': 'application/json',
};
async function dbLoad() {
  let r = await fetch(`${OKR_SUPABASE_URL}/rest/v1/${TABLE}?select=*&ciclo=eq.${CYCLE_N}&order=semana.asc`, { headers: okrHeaders });
  if (!r.ok) {
    r = await fetch(`${OKR_SUPABASE_URL}/rest/v1/${TABLE}?select=*&order=semana.asc`, { headers: okrHeaders });
    if (!r.ok) throw new Error('load');
  }
  return r.json();
}
async function dbSave(row) {
  const payload = { ...row, ciclo: CYCLE_N, updated_at: new Date().toISOString() };
  let r = await fetch(`${OKR_SUPABASE_URL}/rest/v1/${TABLE}`, {
    method: 'POST',
    headers: { ...okrHeaders, Prefer: 'resolution=merge-duplicates,return=representation' },
    body: JSON.stringify(payload),
  });
  if (!r.ok && payload.ciclo != null) {
    const { ciclo, ...legacy } = payload;
    r = await fetch(`${OKR_SUPABASE_URL}/rest/v1/${TABLE}`, {
      method: 'POST',
      headers: { ...okrHeaders, Prefer: 'resolution=merge-duplicates,return=representation' },
      body: JSON.stringify(legacy),
    });
  }
  if (!r.ok) throw new Error('save');
  return r.json();
}
async function fetchMetricsForPeriod(inicio, fim) {
  if (!tespConfigured()) return null;
  const r = await fetch(`${TESP_SUPABASE_URL}/rest/v1/rpc/${LIVE_METRICS_RPC}`, {
    method: 'POST',
    headers: tespHeaders,
    body: JSON.stringify({ p_inicio: inicio, p_fim: fim }),
  });
  if (!r.ok) return null;
  const data = await r.json();
  if (!data || (data.wau == null && data.tempo_medio == null)) return null;
  return {
    m1: data.wau != null ? Number(data.wau) : null,
    m3: data.tempo_medio != null ? Number(data.tempo_medio) : null,
    updatedAt: data.updated_at || null,
  };
}
async function fetchLiveMetrics() {
  const period = metricsPeriod();
  return fetchMetricsForPeriod(period.inicio, period.fim);
}
async function syncHistoricalMetrics() {
  if (!tespConfigured()) return false;
  const cache = loadHistCache();
  let cacheUpdated = false;
  await Promise.all(Array.from({ length: CURRENT_WEEK }, (_, i) => {
    const wi = i + 1;
    const bounds = weekPeriodBounds(wi);
    if (!bounds) return Promise.resolve();
    const key = histCacheKey(wi, bounds);
    const isComplete = wi < CURRENT_WEEK;
    if (isComplete && cache[key]) {
      HIST_METRICS[wi] = cache[key];
      return Promise.resolve();
    }
    return fetchMetricsForPeriod(bounds.inicio, bounds.fim).then(metrics => {
      if (!metrics) return;
      HIST_METRICS[wi] = { m1: metrics.m1, m3: metrics.m3 };
      if (isComplete) {
        cache[key] = HIST_METRICS[wi];
        cacheUpdated = true;
      }
    });
  }));
  if (cacheUpdated) saveHistCache(cache);
  return Object.keys(HIST_METRICS).length > 0;
}
async function syncRollingDayMetrics(fromDay, toDay) {
  if (!tespConfigured()) return false;
  const cache = loadDayCache();
  let cacheUpdated = false;
  await Promise.all(Array.from({ length: toDay - fromDay + 1 }, (_, i) => {
    const d = fromDay + i;
    if (d > TODAY) return Promise.resolve();
    const bounds = dayRollingPeriodBounds(d);
    const ck = rollingCacheKey(d, bounds);
    const isToday = d === TODAY;
    if (!isToday && cache[ck]) {
      DAY_METRICS[d] = cache[ck];
      return Promise.resolve();
    }
    return fetchMetricsForPeriod(bounds.inicio, bounds.fim).then(metrics => {
      if (!metrics) return;
      DAY_METRICS[d] = { m1: metrics.m1, m3: metrics.m3 };
      if (!isToday) {
        cache[ck] = DAY_METRICS[d];
        cacheUpdated = true;
      }
    });
  }));
  if (cacheUpdated) saveDayCache(cache);
  return Object.keys(DAY_METRICS).length > 0;
}
async function syncLiveMetrics() {
  try {
    const metrics = await fetchLiveMetrics();
    if (!metrics) return false;
    LIVE = { ...metrics, available: metrics.m1 != null || metrics.m3 != null };
    if (LIVE.available) {
      const row = {
        semana: CURRENT_WEEK,
        m1: LIVE.m1,
        m3: LIVE.m3,
        m2: DB[CURRENT_WEEK]?.m2 ?? null,
        nota: DB[CURRENT_WEEK]?.nota ?? null,
      };
      await dbSave(row);
      DB[CURRENT_WEEK] = { ...DB[CURRENT_WEEK], ...row, ciclo: CYCLE_N };
    }
    return LIVE.available;
  } catch (_) {
    return false;
  }
}

function usersAtDay(d) {
  return metricDayReader('m1', d) ?? actualAtDay(d)?.m1 ?? latestMetric('m1', weekOf(Math.max(1, d)));
}
function tempoAtDay(d) {
  return metricDayReader('m3', d) ?? actualAtDay(d)?.m3 ?? latestMetric('m3', weekOf(Math.max(1, d)));
}
function revRealAtDay(d) {
  const w = weekOf(Math.max(1, d));
  if (w < CURRENT_WEEK) return DB[w]?.m2 ?? revenueUpToDay(Math.min(weekEndDay(w), d));
  return revenueUpToDay(d);
}

function buildSummaryForDay(refDay) {
  const w = refDay >= 1 ? weekOf(refDay) : 1;
  const dayOfWeek = refDay >= 1 ? ((refDay - 1) % 7) + 1 : 7;
  const remainInclWeek = 7 - dayOfWeek + 1;
  const remainInclCycle = CYCLE_DAYS - Math.max(1, refDay) + 1;
  const hasRevByDay = revenueEntries.some(e => e.day <= refDay) || Object.keys(DB).some(wk => DB[wk]?.m2 != null && Number(wk) <= w);

  const usersRef = usersAtDay(refDay);
  const usersPrev = usersAtDay(refDay - 1);
  const tempoRef = tempoAtDay(refDay);
  const revRealSemana = revRealAtDay(refDay);
  const revRealDia = refDay >= 1 ? revenueOnDay(refDay) : 0;

  const usersMetaDia = Math.max(0, (expectedAt(w).m1 - usersRef) / remainInclWeek);
  const usersRealDia = usersRef - usersPrev;

  const revMetaDia = hasRevByDay ? Math.max(0, (3000 - revRealSemana) / remainInclCycle) : 0;
  const tempoImprovementNeeded = (tempoRef - 2.0) / remainInclCycle;
  const tempoMetaDia = tempoRef - tempoImprovementNeeded;

  return {
    dateLabel: fmtDateShort(dateForDay(refDay)),
    usersMetaDia, usersRealDia,
    usersMetaSemana: expectedAt(w).m1,
    usersRealSemana: usersRef,
    revMetaDia, revRealDia,
    revMetaSemana: expectedAt(w).m2,
    revRealSemana,
    tempoMetaDia, tempoRealDia: tempoRef,
    tempoMetaSemana: expectedAt(w).m3,
    tempoRealSemana: tempoRef,
  };
}

function copySummary() {

  if (!s) return;
  const text = `GRANA CERTA — ${s.dateLabel}\nUsuários   | meta dia: +${Math.round(s.usersMetaDia)} | real dia: ${s.usersRealDia >= 0 ? '+' : ''}${Math.round(s.usersRealDia)} | meta semana: ${Math.round(s.usersMetaSemana)} | real semana: ${Math.round(s.usersRealSemana)}\nReceita    | meta dia: R$${Math.round(s.revMetaDia)} | real dia: R$${Math.round(s.revRealDia)} | meta semana: R$${Math.round(s.revMetaSemana)} | real semana: R$${Math.round(s.revRealSemana)}\nTempo medio| meta dia: ${s.tempoMetaDia.toFixed(2)}min | real dia: ${s.tempoRealDia.toFixed(2)}min | meta semana: ${s.tempoMetaSemana.toFixed(2)}min | real semana: ${s.tempoRealSemana.toFixed(2)}min`;
  navigator.clipboard?.writeText(text).catch(() => {});
  const btn = document.getElementById('btn-copy');
  document.getElementById('copy-label').textContent = 'Copiado!';
  btn.classList.add('is-copied');
  clearTimeout(copyTimer);
  copyTimer = setTimeout(() => {
    document.getElementById('copy-label').textContent = 'Copiar resumo';
    btn.classList.remove('is-copied');
  }, 1800);
}
document.getElementById('btn-copy').onclick = copySummary;

function toggleWeek(w) {
  expanded[w] = !expanded[w];
  renderHistory();
}

function addRevenueEntry() {
  const val = parseFloat(String(newEntryValue).replace(',', '.'));
  if (isNaN(val) || !newEntryDate) return;
  const day = dayFromISO(newEntryDate);
  if (day < 1 || day > CYCLE_DAYS) return;
  revenueEntries = revenueEntries.filter(e => e.day !== day).concat([{ day, iso: newEntryDate, value: val }]).sort((a,b) => a.day - b.day);
  saveRevenueEntries();
  newEntryValue = '';
  render();
}

function renderHoje(data) {
  const cards = data.todayCards.map(kr => `
    <div class="card">
      <div class="card-head">
        <div class="card-label">${kr.label}</div>
        <div class="badge" style="background:${kr.badgeBg};color:${kr.badgeColor}">${kr.badgeLabel}</div>
      </div>
      <div class="metric-pair">
        <div class="metric-box"><div class="metric-key">META HOJE</div><div class="metric-val secondary">${kr.metaLabel}</div></div>
        <div class="metric-box"><div class="metric-key">REAL HOJE</div><div class="metric-val" style="color:${kr.badgeColor}">${kr.realLabel}</div></div>
      </div>
    </div>`).join('');
  document.getElementById('sec-hoje').innerHTML = `
    <div class="section-head accent"><div class="section-dash"></div><div class="section-title accent">Hoje · ${data.todayLabel}</div></div>
    <div class="section-rule"></div>
    <div class="grid-3">${cards}</div>`;
}

function renderRevenue(data) {
  const chips = data.recentEntries.map(e => `<div class="revenue-chip">${e.dateLabel} · ${e.valueLabel}</div>`).join('');
  document.getElementById('sec-revenue').innerHTML = `
    <div class="revenue-bar">
      <label>Lançar receita</label>
      <input type="date" id="rev-date" value="${newEntryDate}">
      <input type="number" id="rev-value" placeholder="valor em R$" value="${newEntryValue}">
      <button class="btn-save btn-add" type="button" id="rev-add">Adicionar</button>
      <div class="revenue-chips">${chips}</div>
    </div>`;
  document.getElementById('rev-date').onchange = e => { newEntryDate = e.target.value; };
  document.getElementById('rev-value').oninput = e => { newEntryValue = e.target.value; };
  document.getElementById('rev-add').onclick = addRevenueEntry;
}

function renderWeek(data) {
  const cards = data.weekCards.map(kr => `
    <div class="card">
      <div class="card-label" style="margin-bottom:14px">${kr.label}</div>
      <div class="week-grid">
        <div><div class="metric-key">META SEMANA</div><div class="metric-val" style="color:var(--text-2)">${kr.metaLabel}</div></div>
        <div><div class="metric-key">REAL SEMANA</div><div class="metric-val">${kr.realLabel}</div></div>
        <div><div class="metric-key">FALTA</div><div class="metric-val" style="color:var(--text-2)">${kr.faltaLabel}</div></div>
        <div><div class="metric-key">% ANDADO</div><div class="metric-val" style="color:${kr.pctColor}">${kr.pctLabel}</div></div>
      </div>
    </div>`).join('');
  document.getElementById('sec-week').innerHTML = `
    <div class="section-title muted" style="margin-bottom:4px">Semana atual · S${String(CURRENT_WEEK).padStart(2,'0')}</div>
    <div class="section-rule"></div>
    <div class="grid-3">${cards}</div>`;
}

function renderTrend(data) {
  const metrics = data.metricOptions.map(m => `<button class="metric-pill${m.active ? ' is-active' : ''}" data-metric="${m.key}">${m.label}</button>`).join('');
  const pills = data.periodOptions.map(p => `<button class="period-pill${p.active ? ' is-active' : ''}" data-period="${p.key}">${p.label}</button>`).join('');
  const customDates = trendPeriod === 'custom' ? `<span style="color:var(--muted);font-size:11px">–</span><input type="date" id="custom-start" value="${customStart}"><span style="color:var(--muted);font-size:11px">–</span><input type="date" id="custom-end" value="${customEnd}">` : '';
  const ch = data.trendChart;
  let chartBody;
  if (ch.empty) {
    chartBody = `<div class="chart-empty">sem dados suficientes<br>aguardando 1º lançamento</div>`;
  } else {
    const gridLines = ch.xTicks.map(xt => `<line x1="${xt.px}" y1="10" x2="${xt.px}" y2="${ch.plotBottom}" stroke="${xt.lineStroke}" stroke-width="${xt.lineWidth}"/>`).join('');
    const dots = ch.realDots.map(rd => `<circle cx="${rd.cx}" cy="${rd.cy}" r="3" fill="var(--text)"/>`).join('');
    const xLabels = ch.xTicks.map(xt => `<div class="chart-axis-x${xt.isToday ? ' is-today' : ''}" style="left:${xt.leftPct}%">${xt.label}</div>`).join('');
    const yLabels = ch.yTicks.map(yt => `<div class="chart-axis-y" style="top:${yt.topPct}%">${yt.label}</div>`).join('');
    const valueLabels = ch.realLabels.map(rl => `<div class="chart-real-label" style="left:${rl.leftPct}%;top:${rl.labelTopPct}%">${rl.label}</div>`).join('');
    chartBody = `<div class="chart-wrap">
      <svg viewBox="0 0 900 320" width="100%" height="320">${gridLines}
        <path d="${ch.metaPath}" fill="none" stroke="var(--muted)" stroke-width="2" stroke-dasharray="5 4"/>
        <path d="${ch.projPath}" fill="none" stroke="var(--accent-fill)" stroke-width="2" stroke-dasharray="2 4"/>
        <path d="${ch.realPath}" fill="none" stroke="var(--text)" stroke-width="2.5"/>${dots}
      </svg>${xLabels}${yLabels}${valueLabels}
    </div>`;
  }
  document.getElementById('sec-trend').innerHTML = `
    <div class="trend-head">
      <div class="metric-pills">${metrics}</div>
      <div class="trend-controls period-pills">${pills}<span class="period-dates">${customDates}</span></div>
    </div>
    <div class="card chart-card">
      <div class="chart-head"><div class="card-label">${ch.label}</div>
        <div class="chart-legend"><span><i style="background:var(--text)"></i>real</span><span><i style="background:var(--muted)"></i>meta</span><span><i style="background:var(--accent-fill)"></i>proj.</span></div>
      </div>${chartBody}
    </div>`;
  document.querySelectorAll('.metric-pill').forEach(btn => {
    btn.onclick = () => { trendMetric = btn.dataset.metric; localStorage.setItem('gc-trend-metric', trendMetric); renderTrend(computeData()); };
  });
  document.querySelectorAll('.period-pill').forEach(btn => {
    btn.onclick = () => { trendPeriod = btn.dataset.period; localStorage.setItem('gc-trend-period', trendPeriod); renderTrend(computeData()); };
  });
  const cs = document.getElementById('custom-start'), ce = document.getElementById('custom-end');
  if (cs) cs.onchange = e => { customStart = e.target.value; localStorage.setItem('gc-custom-start', customStart); trendPeriod = 'custom'; renderTrend(computeData()); };
  if (ce) ce.onchange = e => { customEnd = e.target.value; localStorage.setItem('gc-custom-end', customEnd); trendPeriod = 'custom'; renderTrend(computeData()); };
}

function renderHistory(data) {
  const weeks = data.weeks.map(wk => {
    const open = expanded[wk.n] ? ' is-open' : '';
    return `<div class="week-row${wk.isCurrent ? ' is-current' : ''}${wk.isFuture ? ' is-future' : ''}${open}" id="wk-${wk.n}">
      <div class="week-row-head" onclick="toggleWeek(${wk.n})">
        <div style="display:flex;align-items:center;gap:16px">
          <div class="week-num">S${String(wk.n).padStart(2,'0')}</div>
          <div class="week-dots"><i style="background:${wk.dotUsers}"></i><i style="background:${wk.dotRevenue}"></i><i style="background:${wk.dotTempo}"></i></div>
        </div>
        <div class="week-meta">
          <div class="week-dates">${wk.dateRange}</div>
          <div class="status-chip" style="background:${wk.statusBg};color:${wk.statusColor}">${wk.statusLabel}</div>
          <div class="week-chevron">▾</div>
        </div>
      </div>
      <div class="week-body">
        <div class="week-values">
          <div class="week-field"><label>Usuários (WAU)</label><div class="display-val">${wk.m1Label}</div></div>
          <div class="week-field"><label>Receita acumulada (R$)</label><div class="display-val">${wk.m2Label}</div></div>
          <div class="week-field"><label>Tempo médio (min)</label><div class="display-val">${wk.m3Label}</div></div>
        </div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('sec-history').innerHTML = `
    <div class="section-title muted" style="margin-bottom:4px">Registro semanal · histórico</div>
    <div class="section-rule"></div>${weeks}`;
}

function computeData() {
  const w = CURRENT_WEEK;
  const dayOfWeek = ((TODAY - 1) % 7) + 1;
  const remainInclWeek = 7 - dayOfWeek + 1;
  const remainInclCycle = CYCLE_DAYS - TODAY + 1;
  const hasEntries = revenueEntries.length > 0;

  const usersToday = actualAtDay(TODAY)?.m1 ?? latestMetric('m1', w);
  const usersYesterday = actualAtDay(TODAY - 1)?.m1 ?? latestMetric('m1', Math.max(1, w - 1));
  const tempoToday = actualAtDay(TODAY)?.m3 ?? latestMetric('m3', w);
  const revenueCum = revenueUpToDay(TODAY);
  const revenueToday = revenueOnDay(TODAY);
  const weekRevFromDb = DB[w]?.m2;
  const revRealSemana = weekRevFromDb != null ? weekRevFromDb : revenueCum;

  const usersMetaDia = Math.max(0, (expectedAt(w).m1 - usersToday) / remainInclWeek);
  const usersRealDia = usersToday - usersYesterday;
  const usersBadge = usersRealDia >= usersMetaDia ? 'success' : 'danger';

  const revMetaDia = hasEntries || weekRevFromDb != null ? Math.max(0, (3000 - revRealSemana) / remainInclCycle) : 0;
  const revBadge = !hasEntries && weekRevFromDb == null ? 'neutral' : (revenueToday >= revMetaDia ? 'success' : 'danger');

  const tempoImprovementNeeded = (tempoToday - 2.0) / remainInclCycle;
  const tempoMetaDia = tempoToday - tempoImprovementNeeded;
  const tempoBadge = tempoToday <= tempoMetaDia ? 'success' : 'danger';

  const bU = badgeStyle(usersBadge), bR = badgeStyle(revBadge), bT = badgeStyle(tempoBadge);
  const todayCards = [
    { label: 'Usuários (WAU)', metaLabel: '+' + Math.round(usersMetaDia), realLabel: (usersRealDia >= 0 ? '+' : '') + Math.round(usersRealDia), badgeBg: bU.bg, badgeColor: bU.color, badgeLabel: bU.label },
    { label: 'Receita', metaLabel: hasEntries || weekRevFromDb != null ? fmtMoney(revMetaDia) : '—', realLabel: hasEntries ? fmtMoney(revenueToday) : (weekRevFromDb != null ? fmtMoney(revenueToday) : '—'), badgeBg: bR.bg, badgeColor: bR.color, badgeLabel: bR.label },
    { label: 'Tempo médio', metaLabel: fmtMin(tempoMetaDia), realLabel: fmtMin(tempoToday), badgeBg: bT.bg, badgeColor: bT.color, badgeLabel: bT.label },
  ];

  const usersMetaSemana = expectedAt(w).m1;
  const usersRealSemana = usersToday;
  const revMetaSemana = expectedAt(w).m2;
  const tempoMetaSemana = expectedAt(w).m3;
  const tempoRealSemana = tempoToday;
  const usersPct = (usersRealSemana / usersMetaSemana) * 100;
  const revPct = revMetaSemana > 0 ? (revRealSemana / revMetaSemana) * 100 : 0;
  const tempoPct = (tempoMetaSemana / tempoRealSemana) * 100;

  const weekCards = [
    { label: 'Usuários (WAU)', metaLabel: fmtInt(usersMetaSemana), realLabel: fmtInt(usersRealSemana), faltaLabel: fmtInt(Math.max(0, usersMetaSemana - usersRealSemana)), pctLabel: Math.round(usersPct) + '%', pctColor: pctColor(usersPct) },
    { label: 'Receita', metaLabel: fmtMoney(revMetaSemana), realLabel: fmtMoney(revRealSemana), faltaLabel: fmtMoney(Math.max(0, revMetaSemana - revRealSemana)), pctLabel: Math.round(revPct) + '%', pctColor: hasEntries || weekRevFromDb != null ? pctColor(revPct) : 'var(--muted)' },
    { label: 'Tempo médio', metaLabel: fmtMin(tempoMetaSemana), realLabel: fmtMin(tempoRealSemana), faltaLabel: fmtMin(Math.max(0, tempoRealSemana - tempoMetaSemana)), pctLabel: Math.round(tempoPct) + '%', pctColor: pctColor(tempoPct) },
  ];

  const periodOptions = ['7','14','cycle','custom'].map(key => ({
    key, label: key === '7' ? '7 dias' : key === '14' ? '14 dias' : key === 'cycle' ? 'Ciclo completo' : 'Custom',
    active: trendPeriod === key,
  }));

  const metricOptions = [
    { key: 'users', label: 'Usuários' },
    { key: 'revenue', label: 'Receita' },
    { key: 'tempo', label: 'Tempo médio' },
  ].map(m => ({ ...m, active: trendMetric === m.key }));

  const md = TREND_METRICS[trendMetric] || TREND_METRICS.users;
  const trendChart = buildChart(md.label, md.key, trendMetricHasData(md.key), md.fmt, trendPeriod === 'cycle');

  const statusStyles = {
    done: { label: 'CONCLUÍDA', bg: 'var(--overlay)', color: 'var(--text-2)' },
    current: { label: 'ATUAL', bg: 'var(--accent-subtle)', color: 'var(--accent)' },
    future: { label: 'FUTURA', bg: 'transparent', color: 'var(--muted)' },
  };

  const weeks = [];
  for (let wi = 1; wi <= 12; wi++) {
    const status = wi < w ? 'done' : wi === w ? 'current' : 'future';
    const ss = statusStyles[status];
    const row = DB[wi] || {};
    let dotUsers = 'var(--border)', dotRevenue = 'var(--border)', dotTempo = 'var(--border)';
    if (status !== 'future') {
      const endDay = Math.min(weekEndDay(wi), TODAY);
      const uAct = historyMetricAtWeek('m1', wi) ?? BASELINE.m1;
      const tAct = historyMetricAtWeek('m3', wi) ?? BASELINE.m3;
      const rAct = row.m2 ?? revenueUpToDay(endDay);
      const exp = expectedAtDay(endDay);
      const cf = p => { const tr = tierOf(p); return tr === 'success' ? 'var(--ok)' : tr === 'warning' ? 'var(--risk)' : 'var(--danger)'; };
      dotUsers = historyMetricAtWeek('m1', wi) != null ? cf((uAct / exp.m1) * 100) : 'var(--border)';
      dotTempo = historyMetricAtWeek('m3', wi) != null ? cf((exp.m3 / tAct) * 100) : 'var(--border)';
      dotRevenue = (hasEntries || row.m2 != null) && exp.m2 > 0 ? cf((rAct / exp.m2) * 100) : 'var(--border)';
    }
    if (expanded[wi] === undefined && wi === w) expanded[wi] = true;
    const m1 = historyMetricAtWeek('m1', wi);
    const m2 = row.m2;
    const m3 = historyMetricAtWeek('m3', wi);
    weeks.push({
      n: wi, isCurrent: wi === w, isFuture: wi > w,
      dateRange: fmtDateShort(dateForDay(weekStartDay(wi))) + '–' + fmtDateShort(dateForDay(weekEndDay(wi))),
      statusLabel: ss.label, statusBg: ss.bg, statusColor: ss.color,
      dotUsers, dotRevenue, dotTempo,
      m1Label: m1 != null ? fmtInt(m1) : '—',
      m2Label: m2 != null ? fmtMoney(m2) : '—',
      m3Label: m3 != null ? fmtMin(m3) : '—',
    });
  }

  const recentEntries = revenueEntries.slice(-3).reverse().map(e => ({ dateLabel: fmtDateShort(dateForDay(e.day)), valueLabel: fmtMoney(e.value) }));

  document.getElementById('header-cycle').innerHTML = `Ciclo ${CYCLE_N} · Semana ${w} de 12 · <em>faltam ${CYCLE_DAYS - TODAY} dias</em>`;

  return { todayLabel: fmtDateShort(dateForDay(TODAY)), todayCards, weekCards, periodOptions, metricOptions, trendChart, weeks, recentEntries };
}

function render() {
  const data = computeData();
  renderHoje(data);
  renderRevenue(data);
  renderWeek(data);
  renderTrend(data);
  renderHistory(data);
}

async function init() {
  if (!newEntryDate) newEntryDate = isoForDay(TODAY);
  if (!customStart) customStart = isoForDay(TODAY - 13);
  if (!customEnd) customEnd = isoForDay(TODAY);
  setSyncState('syncing', 'Conectando');
  try {
    const rows = await dbLoad();
    DB = {};
    rows.forEach(r => {
      if (r.ciclo === CYCLE_N || (r.ciclo == null && CYCLE_N <= 2)) DB[r.semana] = r;
    });
    setSyncState('syncing', 'Buscando métricas');
    const liveOk = await syncLiveMetrics();
    setSyncState('syncing', 'Carregando histórico');
    const histOk = await syncHistoricalMetrics();
    const rollOk = await syncRollingDayMetrics(TODAY - 14, TODAY);
    if (!tespConfigured()) {
      setSyncState('synced', 'OKR conectado');
    } else {
      setSyncState('synced', liveOk || histOk || rollOk ? 'Dados ao vivo' : 'OKR conectado');
    }
  } catch(e) {
    setSyncState('error', 'Sem conexão');
    showToast('Erro ao conectar', true);
  }
  render();
  setInterval(async () => {
    const prevLive = LIVE.available;
    const ok = await syncLiveMetrics();
    const histOk = await syncHistoricalMetrics();
    const rollOk = await syncRollingDayMetrics(TODAY - 14, TODAY);
    if (ok || histOk || rollOk || prevLive !== LIVE.available) {
      setSyncState('synced', ok || histOk || rollOk ? 'Dados ao vivo' : 'OKR conectado');
      render();
    }
  }, 5 * 60 * 1000);
}

init();
</script>
