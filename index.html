<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0E0F0C" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#F7F8F2" media="(prefers-color-scheme: light)">
<meta name="description" content="Acompanhamento OKR do Ciclo 3 — Grana Certa · 12 semanas">
<title>Grana Certa — Ciclo 12 Semanas</title>
<link rel="icon" type="image/svg+xml" href="app-icon-512.svg">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700;800&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<script>
(function() {
  var saved = localStorage.getItem('gc-theme');
  var theme = saved || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
  document.documentElement.setAttribute('data-theme', theme);
})();
</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
::selection { background: #B5FF2D; color: #000; }
input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); }
:root[data-theme="dark"] input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); }

:root {
  --accent-fill: #B5FF2D;
  --accent-pressed: #9AE01A;
  --on-accent: #000;
  --ok: #22C55E;
  --ok-bg: #0D2B1A;
  --risk: #FFAA00;
  --risk-bg: #2B1F00;
  --danger: #FF4040;
  --danger-bg: #2B0A0A;
  --info: #4D9EFF;
}
:root[data-theme="dark"] {
  --bg: #0E0F0C; --surface: #161712; --elevated: #1F2119; --overlay: #2A2D22;
  --text: #F7F8F2; --text-2: #D4D6CE; --muted: #6B7060;
  --accent: #B5FF2D; --accent-subtle: #3D5A06; --accent-border: #72A812;
  --border: #2A2D22; --border-strong: #3D4030;
}
:root[data-theme="light"] {
  --bg: #F7F8F2; --surface: #FFFFFF; --elevated: #FFFFFF; --overlay: #ECEEE6;
  --text: #0E0F0C; --text-2: #4A5040; --muted: #A8AA9E;
  --accent: #5A8A00; --accent-subtle: #E8FFB0; --accent-border: #CCEE80;
  --border: #E5E7DF; --border-strong: #C8CABC;
  --ok-bg: #DCFCE7; --risk-bg: #FFF3D0; --danger-bg: #FFE5E5;
}

html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--text);
  font-family: Inter, sans-serif; font-size: 14px; line-height: 1.6;
  min-height: 100vh; -webkit-font-smoothing: antialiased;
  transition: background 0.2s, color 0.2s;
}

.sticky-header {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 28px; border-bottom: 1px solid var(--border);
  background: var(--bg); gap: 16px; flex-wrap: wrap;
}
.header-left { display: flex; align-items: center; gap: 10px; min-width: 0; flex-wrap: wrap; }
.header-mark svg { display: block; flex-shrink: 0; }
.header-wordmark {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 800;
  font-size: 15px; line-height: 0.95; letter-spacing: 0.4px;
}
.header-wordmark .w1 { color: var(--text); }
.header-wordmark .w2 { color: var(--accent); font-weight: 500; }
.header-divider { width: 1px; height: 24px; background: var(--border); margin: 0 6px; flex-shrink: 0; }
.header-cycle {
  font-family: Inter, sans-serif; font-weight: 600; font-size: 11px;
  letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase;
}
.header-cycle em { font-style: normal; color: var(--accent); }
.header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

.btn-copy {
  display: flex; align-items: center; gap: 7px;
  font-family: Inter, sans-serif; font-weight: 600; font-size: 11px;
  letter-spacing: 1px; text-transform: uppercase;
  background: var(--surface); color: var(--text-2);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 8px 14px; cursor: pointer; transition: border-color 0.15s, background 0.15s;
}
.btn-copy:hover { border-color: var(--accent-border); }
.btn-copy.is-copied { background: var(--accent-subtle); color: var(--accent); border-color: var(--accent-border); }

.sync-pill {
  display: flex; align-items: center; gap: 6px;
  font-family: Inter, sans-serif; font-size: 10px; font-weight: 600;
  letter-spacing: 1px; text-transform: uppercase; color: var(--muted);
}
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
.sync-dot.syncing { background: var(--risk); animation: pulse 1s infinite; }
.sync-dot.synced { background: var(--ok); }
.sync-dot.error { background: var(--danger); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.theme-toggle {
  width: 32px; height: 32px; border-radius: 16px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--accent); display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: border-color 0.15s;
}
.theme-toggle:hover { border-color: var(--accent-border); }
.theme-toggle svg { width: 15px; height: 15px; display: block; }
.theme-toggle .icon-sun { display: none; }
.theme-toggle .icon-moon { display: block; }
:root[data-theme="light"] .theme-toggle .icon-sun { display: block; }
:root[data-theme="light"] .theme-toggle .icon-moon { display: none; }

.main { max-width: 1160px; margin: 0 auto; padding: 0 28px 80px; }

.section-head {
  display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px;
}
.section-head.accent .section-dash { background: var(--accent-fill); }
.section-dash { width: 20px; height: 2px; background: var(--accent-fill); flex-shrink: 0; }
.section-title {
  font-family: Inter, sans-serif; font-weight: 600; font-size: 12px;
  letter-spacing: 0.27em; text-transform: uppercase;
}
.section-title.accent { color: var(--accent); }
.section-title.muted { color: var(--muted); font-size: 11px; }
.section-rule { height: 1px; background: var(--border); margin-bottom: 16px; }

.obj-row {
  padding-top: 24px; display: flex; align-items: center;
  justify-content: space-between; gap: 20px; flex-wrap: wrap;
}
.obj-h1 {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 800;
  font-size: 28px; letter-spacing: -0.02em; line-height: 1.05; margin: 0;
}
.obj-h1 em { font-style: normal; color: var(--accent); }
.obj-summary {
  font-size: 13px; line-height: 1.5; color: var(--text-2); max-width: 480px;
}

.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
@media (max-width: 900px) { .grid-3 { grid-template-columns: 1fr; } }

.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 18px;
}
.card-label {
  font-family: Inter, sans-serif; font-weight: 600; font-size: 11px;
  letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase;
}
.card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.badge {
  font-family: Inter, sans-serif; font-weight: 600; font-size: 10px;
  letter-spacing: 1.5px; padding: 3px 8px; border-radius: 20px;
}
.metric-pair { display: flex; gap: 20px; }
.metric-box .metric-key {
  font-family: 'Space Grotesk', monospace; font-size: 10px; color: var(--muted);
}
.metric-box .metric-val {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 26px;
}
.metric-box .metric-val.secondary { color: var(--text-2); }

.week-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 16px; margin-top: 0; }
.week-grid .metric-key {
  font-family: 'Space Grotesk', monospace; font-size: 10px; color: var(--muted);
}
.week-grid .metric-val {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 19px;
}

.revenue-bar {
  margin-top: 20px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 14px 18px;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.revenue-bar label {
  font-family: Inter, sans-serif; font-weight: 600; font-size: 11px;
  letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; white-space: nowrap;
}
.revenue-bar input[type="date"],
.revenue-bar input[type="number"],
.revenue-bar input[type="text"] {
  background: var(--elevated); border: 1px solid var(--border-strong);
  border-radius: 6px; padding: 7px 10px;
  font-family: 'Space Grotesk', monospace; font-size: 12px; color: var(--text);
  outline: none;
}
.revenue-bar input[type="number"] { width: 110px; }
.revenue-bar input:focus { border-color: var(--accent-fill); }
.revenue-chips { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.revenue-chip {
  font-family: 'Space Grotesk', monospace; font-size: 11px; color: var(--text-2);
  background: var(--elevated); border: 1px solid var(--border);
  border-radius: 20px; padding: 4px 10px;
}

.trend-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 4px; flex-wrap: wrap; gap: 10px;
}
.period-pills { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.period-pill {
  font-family: Inter, sans-serif; font-weight: 600; font-size: 10px;
  letter-spacing: 1px; text-transform: uppercase;
  background: transparent; color: var(--muted);
  border: 1px solid var(--border); border-radius: 20px;
  padding: 6px 12px; cursor: pointer; transition: all 0.15s;
}
.period-pill.is-active {
  background: var(--accent-subtle); color: var(--accent); border-color: var(--accent-border);
}
.period-dates input {
  background: var(--elevated); border: 1px solid var(--border-strong);
  border-radius: 6px; padding: 5px 8px;
  font-family: 'Space Grotesk', monospace; font-size: 11px; color: var(--text);
}
.chart-card { padding: 16px; }
.chart-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.chart-legend { display: flex; gap: 10px; flex-wrap: wrap; }
.chart-legend span {
  display: flex; align-items: center; gap: 4px;
  font-family: 'Space Grotesk', monospace; font-size: 9px; color: var(--text-2);
}
.chart-legend i { display: block; width: 8px; height: 2px; }
.chart-empty {
  height: 130px; display: flex; align-items: center; justify-content: center;
  font-family: 'Space Grotesk', monospace; font-size: 11px; color: var(--muted); text-align: center;
}

.week-row {
  border: 1px solid var(--border); border-radius: 6px;
  margin-bottom: 8px; overflow: hidden; background: transparent;
}
.week-row.is-current { background: var(--surface); border-color: var(--accent-fill); }
.week-row-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px; cursor: pointer; user-select: none; gap: 12px;
}
.week-row-head:hover { background: var(--overlay); }
.week-num {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
  font-size: 13px; width: 30px; flex-shrink: 0;
}
.week-row.is-future .week-num { color: var(--muted); }
.week-dots { display: flex; gap: 5px; }
.week-dots i { width: 6px; height: 6px; border-radius: 3px; display: block; }
.week-meta { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
.week-dates { font-family: 'Space Grotesk', monospace; font-size: 11px; color: var(--muted); }
.status-chip {
  font-family: Inter, sans-serif; font-weight: 600; font-size: 10px;
  letter-spacing: 1.5px; padding: 4px 10px; border-radius: 20px;
}
.week-chevron { color: var(--muted); transition: transform 0.15s; font-size: 12px; }
.week-row.is-open .week-chevron { transform: rotate(180deg); }
.week-body { padding: 0 18px 18px; display: none; }
.week-row.is-open .week-body { display: block; }
.week-values { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 14px; }
@media (max-width: 560px) { .week-values { grid-template-columns: 1fr; } }
.week-field label {
  font-family: Inter, sans-serif; font-weight: 600; font-size: 10px;
  letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase;
  display: block; margin-bottom: 6px;
}
.week-field input, .week-field textarea {
  width: 100%; background: var(--elevated); border: 1px solid var(--border);
  border-radius: 6px; padding: 10px 12px; color: var(--text);
  font-family: 'Space Grotesk', monospace; font-size: 14px; outline: none;
}
.week-field input:focus, .week-field textarea:focus { border-color: var(--accent-fill); }
.week-field textarea { font-family: Inter, sans-serif; font-size: 13px; min-height: 56px; resize: vertical; }
.week-field .display-val {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 20px;
}
.btn-save {
  margin-top: 14px; font-family: Inter, sans-serif; font-weight: 600;
  font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
  background: var(--accent-fill); color: var(--on-accent);
  border: none; border-radius: 6px; padding: 8px 16px; cursor: pointer;
}
.btn-save:hover { background: var(--accent-pressed); }
.btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

.mt-36 { margin-top: 36px; }
.mt-40 { margin-top: 40px; }
.mt-48 { margin-top: 48px; }

.toast {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--accent-fill); color: var(--on-accent);
  font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase; border-radius: 20px;
  padding: 12px 20px; opacity: 0; transform: translateY(8px);
  transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 999;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.error { background: var(--danger); color: var(--on-accent); }

@media (max-width: 680px) {
  .sticky-header { padding: 12px 16px; }
  .header-divider, .header-cycle { display: none; }
  .main { padding: 0 16px 60px; }
  .header-left { gap: 8px; }
}
</style>
</head>
<body>

<header class="sticky-header">
  <div class="header-left">
    <div class="header-mark" aria-hidden="true">
      <svg viewBox="0 0 60 45" width="26" height="20">
        <path d="M4 36 A26 26 0 1 1 56 36" stroke="var(--accent-fill)" stroke-width="3" stroke-linecap="round" fill="none"/>
        <line x1="24" y1="30.5" x2="34" y2="18" stroke="var(--accent-fill)" stroke-width="2" stroke-linecap="round"/>

<script>
// ─── THEME ────────────────────────────────────────────────
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('gc-theme', theme);
  document.getElementById('theme-toggle').setAttribute('aria-label', theme === 'light' ? 'Ativar modo escuro' : 'Ativar modo claro');
}
function toggleTheme() {
  applyTheme(document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
  render();
}
document.getElementById('theme-toggle').onclick = toggleTheme;
applyTheme(document.documentElement.getAttribute('data-theme'));

// ─── CONFIG ───────────────────────────────────────────────
// Projeto OKR — "1 ano em 12 semanas" (registro semanal, notas, receita)
const OKR_SUPABASE_URL = 'https://sbywtjxgkhqdeplymhdz.supabase.co';
const OKR_SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNieXd0anhna2hxZGVwbHltaGR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2ODc3NzUsImV4cCI6MjA5MzI2Mzc3NX0.9lGvokR-HdSdZAh-G0_70_0gwA6SKEtPwrvINmQmTnU';

// Projeto TESP — "Tempo de espera SP" (WAU + tempo médio de registros)
// Preencha com credenciais de: Supabase Dashboard → TESP → Settings → API
const TESP_SUPABASE_URL = 'https://SEU-PROJETO-TESP.supabase.co';
const TESP_SUPABASE_KEY = 'SUA-CHAVE-ANON-TESP';

const TABLE = 'okr_ciclo';
const LIVE_METRICS_RPC = 'get_okr_live_metrics';
const WAU_PERIOD_DAYS = 7;
const CYCLE_N = 3;
const CYCLE_DAYS = 84;
const CICLO_START = new Date('2026-07-05T00:00:00-03:00');
const BASELINE = { m1: 438, m2: 0, m3: 5.6 };

const EXPECTED = {
  m1: [0,530,650,790,960,1160,1410,1710,2080,2520,3060,3710,4500],
  m2: [0,0,0,0,0,100,250,450,750,1150,1650,2250,3000],
  m3: [0,5.3,5.0,4.7,4.4,4.1,3.8,3.5,3.2,2.9,2.6,2.3,2.0],
};

let DB = {};
let LIVE = { m1: null, m3: null, updatedAt: null, available: false };
let revenueEntries = JSON.parse(localStorage.getItem('gc-revenue-entries') || '[]');
let expanded = {};
let trendPeriod = localStorage.getItem('gc-trend-period') || '14';
let customStart = localStorage.getItem('gc-custom-start') || '';
let customEnd = localStorage.getItem('gc-custom-end') || '';
let newEntryDate = '';
let newEntryValue = '';
let lastSummary = null;
let copyTimer;

function getCurrentWeek() {
  const diff = Date.now() - CICLO_START.getTime();
  if (diff < 0) return 1;
  return Math.min(Math.max(Math.floor(diff / (7 * 86400000)) + 1, 1), 12);
}
function getTodayDay() {
  const diff = Math.floor((Date.now() - CICLO_START.getTime()) / 86400000) + 1;
  return Math.min(Math.max(diff, 1), CYCLE_DAYS);
}
const CURRENT_WEEK = getCurrentWeek();
const TODAY = getTodayDay();

function weekOf(d) { return Math.ceil(d / 7); }
function weekStartDay(w) { return (w - 1) * 7 + 1; }
function weekEndDay(w) { return Math.min(w * 7, CYCLE_DAYS); }
function dateForDay(d) { return new Date(CICLO_START.getTime() + (d - 1) * 86400000); }
function fmtDateShort(dt) { return String(dt.getDate()).padStart(2,'0') + '/' + String(dt.getMonth()+1).padStart(2,'0'); }
function isoForDay(d) {
  const dt = dateForDay(d);
  return dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
}
function dayFromISO(iso) {
  const dt = new Date(iso + 'T12:00:00');
  return Math.round((dt - CICLO_START) / 86400000) + 1;
}
function metricsPeriod() {
  const end = new Date();
  const start = new Date(end.getTime() - WAU_PERIOD_DAYS * 86400000);
  return { inicio: start.toISOString(), fim: end.toISOString() };
}
function tespConfigured() {
  return !TESP_SUPABASE_URL.includes('SEU-PROJETO') && !TESP_SUPABASE_KEY.includes('SUA-CHAVE');
}
function expectedAt(w) { return { m1: EXPECTED.m1[w], m2: EXPECTED.m2[w], m3: EXPECTED.m3[w] }; }

function expectedAtDay(d) {
  const w = weekOf(d);
  const prev = w > 1 ? expectedAt(w - 1) : { m1: 438, m2: 0, m3: 5.6 };
  const curr = expectedAt(w);
  const frac = (d - weekStartDay(w) + 1) / 7;
  return {
    m1: prev.m1 + (curr.m1 - prev.m1) * frac,
    m2: prev.m2 + (curr.m2 - prev.m2) * frac,
    m3: prev.m3 + (curr.m3 - prev.m3) * frac,
  };
}

function prevWeekValues(w) {
  if (w <= 1) return { ...BASELINE };
  const d = DB[w - 1];
  return {
    m1: d?.m1 ?? BASELINE.m1,
    m2: d?.m2 ?? BASELINE.m2,
    m3: d?.m3 ?? BASELINE.m3,
  };
}

function actualAtDay(d) {
  if (d > TODAY) return null;
  const w = weekOf(d);
  const row = DB[w];
  const liveRow = w === CURRENT_WEEK && LIVE.available
    ? { m1: LIVE.m1, m3: LIVE.m3, m2: row?.m2 ?? null }
    : row;
  if (!liveRow || (liveRow.m1 == null && liveRow.m3 == null)) return null;
  const prev = prevWeekValues(w);
  const frac = (d - weekStartDay(w) + 1) / 7;
  return {
    m1: liveRow.m1 != null ? prev.m1 + (liveRow.m1 - prev.m1) * frac : null,
    m2: liveRow.m2 != null ? liveRow.m2 : revenueUpToDay(d),
    m3: liveRow.m3 != null ? prev.m3 + (liveRow.m3 - prev.m3) * frac : null,
  };
}

function latestMetric(key, upToWeek) {
  if (upToWeek === CURRENT_WEEK && LIVE.available && LIVE[key] != null) return LIVE[key];
  for (let s = upToWeek; s >= 1; s--) {
    if (DB[s]?.[key] != null) return DB[s][key];
  }
  return BASELINE[key];
}

function revenueUpToDay(d) {
  return revenueEntries.filter(e => e.day <= d).reduce((s, e) => s + e.value, 0);
}
function revenueOnDay(d) {
  return revenueEntries.filter(e => e.day === d).reduce((s, e) => s + e.value, 0);
}

function tierOf(pace) { return pace >= 95 ? 'success' : pace >= 70 ? 'warning' : 'danger'; }
function fmtInt(n) { return Math.round(n).toLocaleString('pt-BR'); }
function fmtMoney(n) { return 'R$' + Math.round(n).toLocaleString('pt-BR'); }
function fmtMin(n) { return Number(n).toFixed(2) + ' min'; }
function badgeStyle(tier) {
  if (tier === 'success') return { bg: 'var(--ok-bg)', color: 'var(--ok)', label: '● BATEU' };
  if (tier === 'danger') return { bg: 'var(--danger-bg)', color: 'var(--danger)', label: '● NÃO BATEU' };
  return { bg: 'var(--overlay)', color: 'var(--muted)', label: '○ AGUARDANDO' };
}
function pctColor(pace) {
  const tr = tierOf(pace);
  return tr === 'success' ? 'var(--ok)' : tr === 'warning' ? 'var(--risk)' : 'var(--danger)';
}

function linreg(points) {
  const n = points.length;
  if (n < 2) return { slope: 0, intercept: points[0]?.y ?? 0 };
  let sx=0, sy=0, sxy=0, sxx=0;
  points.forEach(p => { sx+=p.x; sy+=p.y; sxy+=p.x*p.y; sxx+=p.x*p.x; });
  const denom = (n * sxx - sx * sx) || 1;
  return { slope: (n * sxy - sx * sy) / denom, intercept: (sy - (n * sxy - sx * sy) / denom * sx) / n };
}

function pathFromPoints(pts, xmin, xmax, ymin, ymax) {
  const W=300, H=130, PAD=6;
  const sx = x => PAD + ((x - xmin) / (xmax - xmin || 1)) * (W - PAD * 2);
  const sy = y => (H - PAD) - ((y - ymin) / (ymax - ymin || 1)) * (H - PAD * 2);
  return pts.map((p,i) => (i===0?'M':'L') + sx(p.x).toFixed(1) + ' ' + sy(p.y).toFixed(1)).join(' ');
}

async function dbLoad() {

async function dbSave(row) {
  const payload = { ...row, ciclo: CYCLE_N, updated_at: new Date().toISOString() };
  let r = await fetch(`${OKR_SUPABASE_URL}/rest/v1/${TABLE}`, {
    method: 'POST',
    headers: { ...okrHeaders, Prefer: 'resolution=merge-duplicates,return=representation' },
    body: JSON.stringify(payload),
  });
  if (!r.ok && payload.ciclo != null) {
    const { ciclo, ...legacy } = payload;
    r = await fetch(`${OKR_SUPABASE_URL}/rest/v1/${TABLE}`, {
      method: 'POST',
      headers: { ...okrHeaders, Prefer: 'resolution=merge-duplicates,return=representation' },
      body: JSON.stringify(legacy),
    });
  }
  if (!r.ok) throw new Error('save');
  return r.json();
}
async function fetchLiveMetrics() {
  if (!tespConfigured()) return null;
  const period = metricsPeriod();
  const r = await fetch(`${TESP_SUPABASE_URL}/rest/v1/rpc/${LIVE_METRICS_RPC}`, {
    method: 'POST',
    headers: tespHeaders,
    body: JSON.stringify({ p_inicio: period.inicio, p_fim: period.fim }),
  });
  if (!r.ok) return null;
  const data = await r.json();
  if (!data || (data.wau == null && data.tempo_medio == null)) return null;
  return {
    m1: data.wau != null ? Number(data.wau) : null,
    m3: data.tempo_medio != null ? Number(data.tempo_medio) : null,
    updatedAt: data.updated_at || null,
  };
}
async function syncLiveMetrics() {
  try {
    const metrics = await fetchLiveMetrics();
    if (!metrics) return false;
    LIVE = { ...metrics, available: metrics.m1 != null || metrics.m3 != null };
    if (LIVE.available) {
      const row = {
        semana: CURRENT_WEEK,
        m1: LIVE.m1,
        m3: LIVE.m3,
        m2: DB[CURRENT_WEEK]?.m2 ?? null,
        nota: DB[CURRENT_WEEK]?.nota ?? null,
      };
      await dbSave(row);
      DB[CURRENT_WEEK] = { ...DB[CURRENT_WEEK], ...row, ciclo: CYCLE_N };

    return LIVE.available;
  } catch (_) {

  }
}

function buildSeries(key, cumMode) {
  const pts = [{ x: 1, y: BASELINE[key] }];
  for (let w = 1; w <= CURRENT_WEEK; w++) {
    const endDay = Math.min(weekEndDay(w), TODAY);
    let val = key === 'm2' ? revenueUpToDay(endDay) : (w === CURRENT_WEEK ? latestMetric(key, w) : DB[w]?.[key]);
    if (val != null) pts.push({ x: endDay, y: val });
  }
  return pts.filter((p,i,a) => i === 0 || p.y != null);
}

function buildChart(label, key, cumMode, hasData) {
  if (!hasData) return { label, empty: true };
  let periodStartDay, periodEndDay = TODAY;
  if (trendPeriod === '7') periodStartDay = Math.max(1, TODAY - 6);
  else if (trendPeriod === '14') periodStartDay = Math.max(1, TODAY - 13);
  else if (trendPeriod === 'cycle') periodStartDay = 1;
  else {
    periodStartDay = Math.max(1, dayFromISO(customStart) || 1);
    periodEndDay = Math.min(TODAY, dayFromISO(customEnd) || TODAY);
  }
  const realFn = d => {
    if (key === 'm2') return revenueUpToDay(d);
    const a = actualAtDay(d);
    if (a && a[key] != null) return a[key];
    return latestMetric(key, weekOf(d));
  };
  const expFn = d => expectedAtDay(d)[key];
  const realPts = [];
  for (let d = periodStartDay; d <= periodEndDay; d++) realPts.push({ x: d, y: realFn(d) });
  const metaPts = [];
  for (let d = 1; d <= CYCLE_DAYS; d += 4) metaPts.push({ x: d, y: expFn(d) });
  const reg = linreg(realPts.length >= 2 ? realPts : [{ x: 1, y: realFn(1) }, { x: TODAY, y: realFn(TODAY) }]);
  const projPts = [{ x: periodStartDay, y: reg.slope * periodStartDay + reg.intercept }, { x: CYCLE_DAYS, y: reg.slope * CYCLE_DAYS + reg.intercept }];
  const allY = [...realPts.map(p=>p.y), ...metaPts.map(p=>p.y), ...projPts.map(p=>p.y)];
  const ymin = Math.min(...allY), ymax = Math.max(...allY);
  const pad = (ymax - ymin) * 0.1 || 1;
  return {
    label, empty: false,
    realPath: pathFromPoints(realPts, 1, CYCLE_DAYS, ymin - pad, ymax + pad),
    metaPath: pathFromPoints(metaPts, 1, CYCLE_DAYS, ymin - pad, ymax + pad),
    projPath: pathFromPoints(projPts, 1, CYCLE_DAYS, ymin - pad, ymax + pad),
  };
}

function computeData() {
  const w = CURRENT_WEEK;
  const dayOfWeek = ((TODAY - 1) % 7) + 1;
  const remainInclWeek = 7 - dayOfWeek + 1;
  const remainInclCycle = CYCLE_DAYS - TODAY + 1;
  const hasEntries = revenueEntries.length > 0;

  const usersToday = actualAtDay(TODAY)?.m1 ?? latestMetric('m1', w);
  const usersYesterday = actualAtDay(TODAY - 1)?.m1 ?? latestMetric('m1', Math.max(1, w - 1));
  const tempoToday = actualAtDay(TODAY)?.m3 ?? latestMetric('m3', w);
  const revenueCum = revenueUpToDay(TODAY);
  const revenueToday = revenueOnDay(TODAY);
  const weekRevFromDb = DB[w]?.m2;
  const revRealSemana = weekRevFromDb != null ? weekRevFromDb : revenueCum;

  const usersMetaDia = Math.max(0, (expectedAt(w).m1 - usersToday) / remainInclWeek);
  const usersRealDia = usersToday - usersYesterday;
  const usersBadge = usersRealDia >= usersMetaDia ? 'success' : 'danger';

  const revMetaDia = hasEntries || weekRevFromDb != null ? Math.max(0, (3000 - revRealSemana) / remainInclCycle) : 0;
  const revBadge = !hasEntries && weekRevFromDb == null ? 'neutral' : (revenueToday >= revMetaDia ? 'success' : 'danger');

  const tempoImprovementNeeded = (tempoToday - 2.0) / remainInclCycle;
  const tempoMetaDia = tempoToday - tempoImprovementNeeded;
  const tempoBadge = tempoToday <= tempoMetaDia ? 'success' : 'danger';

  const bU = badgeStyle(usersBadge), bR = badgeStyle(revBadge), bT = badgeStyle(tempoBadge);
  const todayCards = [
    { label: 'Usuários (WAU)', metaLabel: '+' + Math.round(usersMetaDia), realLabel: (usersRealDia >= 0 ? '+' : '') + Math.round(usersRealDia), badgeBg: bU.bg, badgeColor: bU.color, badgeLabel: bU.label },
    { label: 'Receita', metaLabel: hasEntries || weekRevFromDb != null ? fmtMoney(revMetaDia) : '—', realLabel: hasEntries ? fmtMoney(revenueToday) : (weekRevFromDb != null ? fmtMoney(revenueToday) : '—'), badgeBg: bR.bg, badgeColor: bR.color, badgeLabel: bR.label },
    { label: 'Tempo médio', metaLabel: fmtMin(tempoMetaDia), realLabel: fmtMin(tempoToday), badgeBg: bT.bg, badgeColor: bT.color, badgeLabel: bT.label },
  ];

  const usersMetaSemana = expectedAt(w).m1;
  const usersRealSemana = usersToday;
  const revMetaSemana = expectedAt(w).m2;
  const tempoMetaSemana = expectedAt(w).m3;
  const tempoRealSemana = tempoToday;
  const usersPct = (usersRealSemana / usersMetaSemana) * 100;
  const revPct = revMetaSemana > 0 ? (revRealSemana / revMetaSemana) * 100 : 0;
  const tempoPct = (tempoMetaSemana / tempoRealSemana) * 100;

  const weekCards = [
    { label: 'Usuários (WAU)', metaLabel: fmtInt(usersMetaSemana), realLabel: fmtInt(usersRealSemana), faltaLabel: fmtInt(Math.max(0, usersMetaSemana - usersRealSemana)), pctLabel: Math.round(usersPct) + '%', pctColor: pctColor(usersPct) },
    { label: 'Receita', metaLabel: fmtMoney(revMetaSemana), realLabel: fmtMoney(revRealSemana), faltaLabel: fmtMoney(Math.max(0, revMetaSemana - revRealSemana)), pctLabel: Math.round(revPct) + '%', pctColor: hasEntries || weekRevFromDb != null ? pctColor(revPct) : 'var(--muted)' },
    { label: 'Tempo médio', metaLabel: fmtMin(tempoMetaSemana), realLabel: fmtMin(tempoRealSemana), faltaLabel: fmtMin(Math.max(0, tempoRealSemana - tempoMetaSemana)), pctLabel: Math.round(tempoPct) + '%', pctColor: pctColor(tempoPct) },
  ];

  lastSummary = {
    dateLabel: fmtDateShort(dateForDay(TODAY)),
    usersMetaDia, usersRealDia, usersMetaSemana, usersRealSemana,
    revMetaDia, revRealDia: revenueToday, revMetaSemana, revRealSemana,
    tempoMetaDia, tempoRealDia: tempoToday, tempoMetaSemana, tempoRealSemana,
  };

  const periodOptions = ['7','14','cycle','custom'].map(key => ({
    key, label: key === '7' ? '7 dias' : key === '14' ? '14 dias' : key === 'cycle' ? 'Ciclo completo' : 'Custom',
    active: trendPeriod === key,
  }));

  const trendCharts = [
    buildChart('Usuários (WAU)', 'm1', false, true),
    buildChart('Receita acumulada', 'm2', true, hasEntries || Object.values(DB).some(r => r?.m2 != null)),
    buildChart('Tempo médio', 'm3', false, true),
  ];

  const statusStyles = {
    done: { label: 'CONCLUÍDA', bg: 'var(--overlay)', color: 'var(--text-2)' },
    current: { label: 'ATUAL', bg: 'var(--accent-subtle)', color: 'var(--accent)' },
    future: { label: 'FUTURA', bg: 'transparent', color: 'var(--muted)' },
  };

  const weeks = [];
  for (let wi = 1; wi <= 12; wi++) {
    const status = wi < w ? 'done' : wi === w ? 'current' : 'future';
    const ss = statusStyles[status];
    const row = DB[wi] || {};
    let dotUsers = 'var(--border)', dotRevenue = 'var(--border)', dotTempo = 'var(--border)';
    if (status !== 'future') {
      const endDay = Math.min(weekEndDay(wi), TODAY);
      const uAct = actualAtDay(endDay)?.m1 ?? (wi === w && LIVE.available ? LIVE.m1 : row.m1) ?? BASELINE.m1;
      const tAct = actualAtDay(endDay)?.m3 ?? (wi === w && LIVE.available ? LIVE.m3 : row.m3) ?? BASELINE.m3;
      const rAct = row.m2 ?? revenueUpToDay(endDay);
      const exp = expectedAtDay(endDay);
      const cf = p => { const tr = tierOf(p); return tr === 'success' ? 'var(--ok)' : tr === 'warning' ? 'var(--risk)' : 'var(--danger)'; };
      dotUsers = cf((uAct / exp.m1) * 100);
      dotTempo = cf((exp.m3 / tAct) * 100);
      dotRevenue = (hasEntries || row.m2 != null) && exp.m2 > 0 ? cf((rAct / exp.m2) * 100) : 'var(--border)';
    }
    if (expanded[wi] === undefined && wi === w) expanded[wi] = true;
    const displayM1 = wi === w && LIVE.available && LIVE.m1 != null ? LIVE.m1 : (row.m1 ?? '');
    const displayM3 = wi === w && LIVE.available && LIVE.m3 != null ? LIVE.m3 : (row.m3 ?? '');
    weeks.push({
      n: wi, isCurrent: wi === w, isFuture: wi > w,
      dateRange: fmtDateShort(dateForDay(weekStartDay(wi))) + '–' + fmtDateShort(dateForDay(weekEndDay(wi))),
      statusLabel: ss.label, statusBg: ss.bg, statusColor: ss.color,
      dotUsers, dotRevenue, dotTempo,
      m1Val: displayM1, m2Val: row.m2 ?? '', m3Val: displayM3, notaVal: row.nota ?? '',
    });
  }

  const recentEntries = revenueEntries.slice(-3).reverse().map(e => ({ dateLabel: fmtDateShort(dateForDay(e.day)), valueLabel: fmtMoney(e.value) }));

  document.getElementById('header-cycle').innerHTML = `Ciclo ${CYCLE_N} · Semana ${w} de 12 · <em>faltam ${CYCLE_DAYS - TODAY} dias</em>`;

  return { todayLabel: fmtDateShort(dateForDay(TODAY)), todayCards, weekCards, periodOptions, trendCharts, weeks, recentEntries };
}

function render() {
  const data = computeData();
  renderHoje(data);
  renderRevenue(data);
  renderWeek(data);
  renderTrend(data);
  renderHistory(data);
}

async function init() {
  if (!newEntryDate) newEntryDate = isoForDay(TODAY);
  if (!customStart) customStart = isoForDay(Math.max(1, TODAY - 13));
  if (!customEnd) customEnd = isoForDay(TODAY);
  setSyncState('syncing', 'Conectando');
  try {
    const rows = await dbLoad();
    DB = {};
    rows.forEach(r => {
      if (r.ciclo === CYCLE_N || (r.ciclo == null && CYCLE_N <= 2)) DB[r.semana] = r;
    });
    setSyncState('syncing', 'Buscando métricas TESP');
    const liveOk = await syncLiveMetrics();
    if (!tespConfigured()) {
      setSyncState('synced', 'OKR conectado · configure TESP');
    } else {
      setSyncState('synced', liveOk ? 'Dados ao vivo (TESP)' : 'OKR conectado');
    }
  } catch(e) {
    setSyncState('error', 'Sem conexão');
    showToast('Erro ao conectar', true);
  }
  render();
  setInterval(async () => {
    const prevLive = LIVE.available;
    const ok = await syncLiveMetrics();
    if (ok || prevLive !== LIVE.available) {
      setSyncState('synced', ok ? 'Dados ao vivo (TESP)' : (tespConfigured() ? 'OKR conectado' : 'OKR conectado · configure TESP'));
      render();
    }
  }, 5 * 60 * 1000);
}

init();
</script>
